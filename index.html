// Scale canvas to fill window at native pixel density
let DPR=1, SCALE=1;
function resize(){
  DPR = window.devicePixelRatio||1;
  SCALE = Math.min(window.innerWidth/IW, window.innerHeight/IH);
  // Canvas physical pixels = game pixels × scale × DPR
  C.width  = Math.round(IW*SCALE*DPR);
  C.height = Math.round(IH*SCALE*DPR);
  C.style.width  = Math.round(IW*SCALE)+'px';
  C.style.height = Math.round(IH*SCALE)+'px';
}
window.addEventListener('resize',resize); resize();

// ── HSL ──────────────────────────────────────────────────
function hsl(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

// ══════════════════════════════════════════════════════════
//  SID-STYLE AUDIO ENGINE  (Web Audio API, C64 inspired)
// ══════════════════════════════════════════════════════════
let AC=null, masterGain=null;
let musicPlaying=false, musicTimer=null, musicStep=0, musicNextTime=0;
const BPM=90, S16=60/BPM/4;  // 16th note at 90 BPM = 0.1667s
const LOOK=0.25;

const N={
  C2:65.41, D2:73.42, E2:82.41, F2:87.31, G2:98, A2:110, Bb2:116.54, B2:123.47,
  C3:130.81, D3:146.83, Eb3:155.56, E3:164.81, F3:174.61, G3:196, Ab3:207.65, A3:220, Bb3:233.08, B3:246.94,
  C4:261.63, D4:293.66, Eb4:311.13, E4:329.63, F4:349.23, G4:392, Ab4:415.3, A4:440, Bb4:466.16, B4:493.88,
  C5:523.25, D5:587.33, Eb5:622.25, E5:659.25, F5:698.46, G5:784, A5:880
};

// ── FUGUE engine ──────────────────────────────────────
// Semitone offset → Hz
const st=(root,s)=>root*Math.pow(2,s/12);

// Fugue subject (16 steps, semitone offsets from root; null = sustain/rest)
// Dramatic descending C-minor subject: leap up a fifth then stepwise descent
const FSUB=[0,null,7,3,0,-2,-4,null,-5,-7,-9,-12,null,null,0,7];
// Countersubject (16 steps) — rising line played by earlier voices
const FCTR=[12,14,15,17,null,15,14,12,null,10,9,7,5,null,3,0];
// Bass pedal roots (one note sustained per 16-step section)
const FBAS=[N.C2, 55, N.D2, N.E2]; // C2, A1(55Hz), D2, E2
// Subject entry roots: C3, A2, D3, E3
const FROOT=[N.C3, N.A2, N.D3, N.E3];
// 64-step loop (4 bars × 16 steps)

// Play a note with N harmonics (natural harmonic series: f, 2f, 3f... at 1/h amplitude)
function playHarm(freq,harmonics,vol,t,dur){
  if(!AC||freq<=0) return;
  const types=['sawtooth','square','triangle','square'];
  for(let h=1;h<=harmonics;h++){
    const hf=freq*h, hv=vol/Math.sqrt(h);
    tone(hf,types[h-1],hv,.003,.03,.6,.05,dur,t,3500/h);
  }
}

function schedMusic(){
  if(!musicPlaying||!AC) return;
  while(musicNextTime<AC.currentTime+LOOK){
    const step=musicStep%64, t=musicNextTime;
    const sec=Math.floor(step/16);  // which section (0-3)
    const ss=step%16;               // step within section

    // ── Bass pedal: sustained root, re-triggered each section ──
    if(ss===0){
      tone(FBAS[sec],'sawtooth',.18,.01,.05,.8,.12,S16*15.4,t,400);
      // Fifth above for power-chord heaviness
      tone(FBAS[sec]*1.5,'sawtooth',.08,.005,.05,.6,.1,S16*7.5,t,500);
    }

    // ── Active voice: plays subject in its key with sec+1 harmonics ──
    const subInt=FSUB[ss];
    if(subInt!==null){
      const freq=st(FROOT[sec],subInt);
      playHarm(freq, sec+1, .095-sec*.008, t, S16*.88);
    }

    // ── Earlier voices: play countersubject (one per previous section) ──
    for(let v=0;v<sec;v++){
      // Stagger each counter voice by 4 steps for contrapuntal texture
      const cStep=(ss+v*4)%16;
      const cInt=FCTR[cStep];
      if(cInt!==null){
        const cFreq=st(FROOT[v], cInt-12); // countersubject an octave up from subject
        playHarm(cFreq, v+1, .055-v*.008, t, S16*.75);
      }
    }

    // ── Rhythmic percussion ──
    if(ss===0||ss===8) nz(.05+sec*.008,.05,t,160);     // downbeat thud
    if(ss===4||ss===12) nz(.025,.025,t,2200);           // backbeat snap
    // Extra tension pulse on beat 3 of full bars (step 8)
    if(ss===8&&sec>=2) nz(.04,.08,t,80,'lowpass');

    musicStep++; musicNextTime+=S16;
  }
  musicTimer=setTimeout(schedMusic,80);
}
function startMenuMusic(){
  if(musicPlaying||!AC) return;
  musicPlaying=true; musicStep=0; musicNextTime=AC.currentTime+.05;
  schedMusic();
}
function stopMusic(){
  musicPlaying=false;
  if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; }
}

function initAudio(){
  if(AC) return;
  try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=0.4;
    masterGain.connect(AC.destination);
  }catch(e){}
}
function resumeAudio(){ if(AC&&AC.state==='suspended') AC.resume(); }

function tone(f,type,vol,a,d,sus,r,dur,t,fCut){
  if(!AC||!f||f<=0) return;
  t=t||AC.currentTime;
  const osc=AC.createOscillator(), g=AC.createGain(), flt=AC.createBiquadFilter();
  flt.type='lowpass'; flt.frequency.value=fCut||7000; flt.Q.value=fCut?2.5:.5;
  osc.type=type; osc.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+a);
  g.gain.linearRampToValueAtTime(vol*sus,t+a+d);
  g.gain.setValueAtTime(vol*sus,t+Math.max(t+a+d,t+dur-.001)-t);
  g.gain.linearRampToValueAtTime(0,t+dur+r);
  osc.connect(flt); flt.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t+dur+r+.02);
}
function sweep(f0,f1,type,vol,dur,t){
  if(!AC) return; t=t||AC.currentTime;
  const osc=AC.createOscillator(), g=AC.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(f0,t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(f1,10),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.linearRampToValueAtTime(0,t+dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t+dur+.02);
}
function nz(vol,dur,t,fCut,fType){
  if(!AC) return; t=t||AC.currentTime;
  const len=Math.ceil(AC.sampleRate*.5), buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
  const flt=AC.createBiquadFilter(); flt.type=fType||'bandpass';
  flt.frequency.value=fCut||500; flt.Q.value=.8;
  const g=AC.createGain();
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  src.connect(flt); flt.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t+dur+.02);
}

// ── MAP ──────────────────────────────────────────────────
const TW=16, TH=16, MW=50, MH=28;
let map, tileHP, dustPiles;
const TILE_MAX_HP=3, DUST_MAX=TH*5;
const FLOOR_PX=()=>(MH-2)*TH;

function initBaseMap(){
  map    = Array.from({length:MH},()=>new Uint8Array(MW));
  tileHP = Array.from({length:MH},()=>new Uint8Array(MW));
  dustPiles = new Float32Array(MW);
  for(let x=0;x<MW;x++){ map[MH-1][x]=1; map[MH-2][x]=1; }
  for(let y=0;y<MH;y++){ map[y][0]=1; map[y][MW-1]=1; }
  for(let x=0;x<MW;x++) map[0][x]=1;
  genRandomPlatforms();
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) if(map[y][x]) tileHP[y][x]=TILE_MAX_HP;
}
function genRandomPlatforms(){
  const count=10+rnd(0,6);
  for(let i=0;i<count;i++){
    const tx=rnd(2,MW-8), ty=rnd(5,MH-5), tw=rnd(3,9);
    for(let x=tx;x<tx+tw&&x<MW-1;x++) map[ty][x]=1;
  }
  for(const [a,b] of [[2,8],[MW-10,MW-2]]){
    for(let r=0;r<3;r++){
      const tx=rnd(a,b), ty=rnd(6,MH-4), tw=rnd(3,6);
      for(let x=tx;x<tx+tw&&x<MW-1;x++) map[ty][x]=1;
    }
  }
}
function setTile(tx,ty,v){ if(tx<0||tx>=MW||ty<0||ty>=MH)return; map[ty][tx]=v; tileHP[ty][tx]=v?TILE_MAX_HP:0; }
function addDebrisPlatform(cx,w){
  const tx=Math.floor(cx/TW), tw=Math.max(2,Math.floor(w/TW));
  const nx=clamp(tx-Math.floor(tw/2),1,MW-1-tw);
  const ry=clamp(MH-3-rnd(2,10),4,MH-4);
  for(let x=nx;x<nx+tw&&x<MW-1;x++) setTile(x,ry,1);
}
function damageTile(tx,ty){
  if(tx<=0||tx>=MW-1||ty<=0||ty>=MH-2) return;
  if(!map[ty][tx]) return;
  tileHP[ty][tx]--;
  const px=tx*TW+TW/2, py=ty*TH+TH/2;
  if(tileHP[ty][tx]<=0){
    map[ty][tx]=0; tileHP[ty][tx]=0;
    for(let d=-2;d<=2;d++){
      const dtx=tx+d; if(dtx<0||dtx>=MW) continue;
      dustPiles[dtx]=Math.min(DUST_MAX,dustPiles[dtx]+TH*(1.1-Math.abs(d)*0.3));
    }
    for(let i=0;i<18;i++){
      const a=Math.random()*Math.PI*2,s=Math.random()*4+0.5;
      particles.push({x:px+rnd(-6,6),y:py+rnd(-4,4),vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:rnd(18,45),col:Math.random()<0.5?lvl.dust:lvl.dustT,size:rnd(1,4)});
    }
  } else {
    for(let i=0;i<4;i++){
      const a=Math.random()*Math.PI*2,s=Math.random()*2;
      particles.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(6,16),col:lvl.crack2,size:1});
    }
  }
}
function pushDust(bx,bw){
  const tx0=Math.floor(bx/TW), tx1=Math.floor((bx+bw)/TW);
  for(let tx=tx0;tx<=tx1;tx++){
    if(tx<0||tx>=MW) continue;
    const push=Math.min(dustPiles[tx],TH*0.18);
    dustPiles[tx]-=push;
    if(tx>0)    dustPiles[tx-1]=Math.min(DUST_MAX,dustPiles[tx-1]+push*0.4);
    if(tx<MW-1) dustPiles[tx+1]=Math.min(DUST_MAX,dustPiles[tx+1]+push*0.4);
  }
}
function dustSurfaceUnder(bx,bw){
  const fy=FLOOR_PX();
  const tx0=Math.max(0,Math.floor(bx/TW)), tx1=Math.min(MW-1,Math.floor((bx+bw-1)/TW));
  let minSurf=fy;
  for(let tx=tx0;tx<=tx1;tx++) if(dustPiles[tx]>2) minSurf=Math.min(minSurf,fy-dustPiles[tx]);
  return minSurf;
}
function solid(tx,ty){ if(tx<0||tx>=MW||ty<0||ty>=MH) return true; return map[ty][tx]===1; }
function isHardSolid(tx,ty){ return tx<=0||tx>=MW-1||ty>=MH-2||ty<=0; }
function solidFull(tx,ty){ if(tx<0||tx>=MW||ty<0||ty>=MH) return true; if(!map[ty][tx]) return false; return isHardSolid(tx,ty); }
function solidOneWayTop(tx,ty){ if(tx<0||tx>=MW||ty<0||ty>=MH) return false; return map[ty][tx]===1&&!isHardSolid(tx,ty); }

// ── PHYSICS ──────────────────────────────────────────────
class Body{
  constructor(x,y,w,h){ this.x=x;this.y=y;this.w=w;this.h=h;this.vx=0;this.vy=0;this.onGround=false; }
  step(grav=0.45){
    this.vy=Math.min(this.vy+grav,18);
    this.x+=this.vx; this._rx();
    this.y+=this.vy; this.onGround=false; this._ry();
  }
  _rx(){
    const l=this.x,r=this.x+this.w-1,t=this.y+4,b=this.y+this.h-5;
    const hd=(px,py)=>solidFull(Math.floor(px/TW),Math.floor(py/TH));
    if(hd(l,t)||hd(l,b)){this.x=(Math.floor(l/TW)+1)*TW;this.vx=0;}
    if(hd(r,t)||hd(r,b)){this.x=Math.floor(r/TW)*TW-this.w;this.vx=0;}
  }
  _ry(){
    const l=this.x+2,r=this.x+this.w-3;
    const hd=(px,py)=>solidFull(Math.floor(px/TW),Math.floor(py/TH));
    const any=(px,py)=>{ const tx=Math.floor(px/TW),ty=Math.floor(py/TH); return solidFull(tx,ty)||solidOneWayTop(tx,ty); };
    if(hd(l,this.y)||hd(r,this.y)){this.y=(Math.floor(this.y/TH)+1)*TH;if(this.vy<0)this.vy=0;}
    const bot=this.y+this.h-1;
    if(this.vy>=0&&(any(l,bot)||any(r,bot))){this.y=Math.floor(bot/TH)*TH-this.h;this.onGround=true;this.vy=0;}
  }
  hits(o){ return this.x<o.x+o.w&&this.x+this.w>o.x&&this.y<o.y+o.h&&this.y+this.h>o.y; }
}
function checkDustLanding(p){
  if(p.vy<0) return;
  const surf=dustSurfaceUnder(p.x,p.w);
  if(p.y+p.h>surf&&p.y+p.h-p.vy<=surf+10){ p.y=surf-p.h; p.vy=0; p.onGround=true; }
}

function update(){
  gFrame++;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
  if(shake>0) shake--;
  if     (gState==='MENU')      uMenu();
  else if(gState==='CIN_SPACE') uCinSpace();
  else if(gState==='CIN_ORBIT') uCinOrbit();
  else if(gState==='CIN_PAN')   uCinPan();
  else if(gState==='CIN_CRASH') uCinCrash();
  else if(gState==='PLAY')      uPlay();
  else if(gState==='EXTRACT')   uExtract();
  else if(gState==='WARP')      uWarp();
  else if(gState==='STORE')     uStore();
  else if(gState==='DEAD')      uDead();
  justPressed.clear();
}

// ═══════════════════════════════════════════════════════
//  CIN_SPACE — single clean lateral plane, Flashback-style
//  Beat 1  (  0-80):  Enemy cruiser enters from right
//  Beat 2  ( 80-160): Our ship enters from left, laser 1 misses
//  Beat 3  (160-260): Laser 2, narrow dodge
//  Beat 4  (260-360): Laser 3 hits — tumbling + smoke
//  Beat 5  (360-460): Ship tumbles off screen → CUT to orbit
// ═══════════════════════════════════════════════════════
function uCinSpace(){
  cinT++;

  if(!cs.exploding){
    // ── Beat 1: our ship flies in, cruiser looms ─────────
    if(cinT<=80){
      cs.x+=cs.vx; cs.vx*=.97;
      cs.x=Math.min(cs.x, W*.28);
    }

    // ── Beat 2: laser 1 ───────────────────────────────────
    if(cinT===90){ cShots.push({id:1,x:W+20,y:H*.44,vx:-32,alive:true}); sndLaser(); }
    if(cinT>90&&cinT<140){
      cs.y=lerp(cs.y,H*.28,.14);
      cs.angle=lerp(cs.angle,-.28,.1);
    }
    if(cinT>140&&cinT<180){
      cs.y=lerp(cs.y,H*.44,.1);
      cs.angle=lerp(cs.angle,0,.1);
    }

    // ── Beat 3: laser 2 ───────────────────────────────────
    if(cinT===190){ cShots.push({id:2,x:W+20,y:H*.3,vx:-38,alive:true}); sndLaser(); }
    if(cinT>190&&cinT<240){
      cs.y=lerp(cs.y,H*.58,.16);
      cs.angle=lerp(cs.angle,.22,.1);
    }
    if(cinT>240&&cinT<270){
      cs.y=lerp(cs.y,H*.44,.1);
      cs.angle=lerp(cs.angle,0,.1);
    }

    // ── Beat 4: laser 3 — HITS ────────────────────────────
    if(cinT===280){ cShots.push({id:3,x:W+20,y:H*.46,vx:-44,alive:true}); sndLaser(); }

    // Move all bolts
    for(const s of cShots){
      if(!s.alive) continue;
      s.x+=s.vx;
      // Hit check for shot 3
      if(s.id===3&&s.x<cs.x+52&&s.x>cs.x-10&&Math.abs(s.y-(cs.y+18))<20){
        s.alive=false;
        cs.exploding=true; cs.explodeT=0;
        cs.vx=-0.5; cs.vy=0.8;
        cs.tumbleAv=.08+Math.random()*.04;
        cs.tumbleAngle=cs.angle;
        fx(cs.x+30,cs.y+18,35,P.flame,7,4);
        fx(cs.x+30,cs.y+18,18,P.ship,4,3);
        fx(cs.x+30,cs.y+18,12,'#ffffff',6,2);
        sndExplode(); shake=30;
      }
      if(s.x<-60) s.alive=false;
    }
  }

  // ── Beat 5: tumbling drift after hit ─────────────────
  if(cs.exploding){
    cs.explodeT++;
    cs.x+=cs.vx; cs.y+=cs.vy;
    cs.vy+=.012;
    cs.tumbleAngle+=cs.tumbleAv;
    cs.tumbleAv*=.995; // spin slows slightly
    // Smoke + flame trail
    if(cs.explodeT%3===0){
      fx(cs.x+30+rnd(-8,8),cs.y+18+rnd(-6,6),2,P.flame,2,2);
      fx(cs.x+30,cs.y+18,1,P.gray,1.5,2);
    }
    // Cut to orbit after ship tumbles past screen edge or enough time
    if(cs.explodeT>120||(cs.y>H+40)){
      gState='CIN_ORBIT'; cinT=0;
      planet={x:W*.5,y:H+320,r:220};
      cs.x=W*.75; cs.y=H*.12; cs.scale=.5; cs.angle=.1;
      cs.exploding=false; cs.tumbleAngle=0;
    }
  }

  if(cinT>560&&!cs.exploding){ gState='CIN_ORBIT'; cinT=0; planet={x:W*.5,y:H+320,r:220}; }
}

// ═══════════════════════════════════════════════════════
//  CIN_ORBIT — cut to black → planet fills half screen → ship enters orbit
//  ~5s (300 frames)
// ═══════════════════════════════════════════════════════
function uCinOrbit(){
  cinT++;
  // Phase A (0-30): black hold (planet not visible yet)
  // Phase B (30+): planet rises fast to centre-bottom, fills lower half
  if(cinT>30){
    const targetY=H*.82; // planet centre sits low — fills lower half
    planet.y=lerp(planet.y,targetY,.055);
    planet.r=lerp(planet.r,240,.04);
  }
  // Ship: enters upper-right after frame 60, arcs into orbit
  if(cinT>60){
    const t=(cinT-60)/180;
    const orbitAngle=-Math.PI*.6 + t*Math.PI*.5;
    const orbitR=planet.r*.8;
    const tx=planet.x+Math.cos(orbitAngle)*orbitR-20;
    const ty=planet.y+Math.sin(orbitAngle)*orbitR-15;
    cs.x=lerp(cs.x,tx,.04); cs.y=lerp(cs.y,ty,.04);
    cs.angle=orbitAngle+Math.PI*.5;
    if(gFrame%5===0) fx(cs.x+16,cs.y+18,1,P.gray,1,2);
    // Damaged thruster sputter every ~0.5s
    if(cinT%30===0) sndThruster(.03);
  }
  if(cinT>300){ gState='CIN_CRASH'; cinT=0; initCrashEntry(); }
}

function initCrashEntry(){

function uCinCrash(){
  cinT++;
  if(!crashDone){
    // Straight queda livre toward map centre
    cs.vy+=.09;                       // gravity
    cs.y+=cs.vy; cs.x+=cs.vx;
    cs.angle+=cs.av;
    // Smoke trail every 2 frames

      fx(cs.x+28+rnd(-6,6),cs.y+10,1,P.gray,1,2);
      fx(cs.x+28,cs.y+30,1,P.flame,2,2);
    }
    const sx=cs.x+28, sy=cs.y+40;
    const floorY=MH*TH-TH*2;
    if(sy>=floorY-8){
      crashDone=true; crashX=sx; crashY=floorY;
      cs.crashed=true; cs.vx=0; cs.vy=0; cs.y=floorY-50; cs.angle=rnd(-8,8)*.03;
      fx(sx,crashY,70,P.flame,10,4); fx(sx,crashY,40,P.ship,6,3); fx(sx,crashY,30,P.yellow,8,3);
      sndExplode();
      shake=50;
      for(let i=0;i<18;i++){
        const a=-(Math.random()*Math.PI), spd=rnd(5,18), dw=rnd(18,55), dh=rnd(5,16);
        debris.push({x:sx+rnd(-24,24),y:crashY-18,
          vx:Math.cos(a)*spd*(Math.random()<.5?1:-1),vy:Math.sin(a)*spd-3,
          w:dw,h:dh,angle:0,av:rnd(-9,9)*.02,col:i%2===0?P.ship:P.shipDark,landed:false});
      }
    }
  }
  for(const d of debris){
    if(d.landed) continue;
    d.vy+=.38; d.x+=d.vx; d.y+=d.vy; d.vx*=.97; d.angle+=d.av;
    const flr=MH*TH-TH*2;
    if(d.y+d.h>=flr){
      d.y=flr-d.h; d.vy*=-.2; d.vx*=.6; d.av*=.5;
      if(Math.abs(d.vy)<.8){ d.landed=true; fx(d.x+d.w/2,d.y,6,P.flame,2,2); addDebrisPlatform(d.x+d.w/2,d.w+rnd(0,18)); }
    }
  }
  // Spawn players near wreck
  if(crashDone&&cinT>100&&players.length===0){
    const spx=clamp(crashX-40,TW+4,W-TW-PW*3-10);
    initPlayers(spx,MH*TH-TH*2-PH-4);
  }
  for(let x=1;x<MW-1;x++){ map[MH-1][x]=1; map[MH-2][x]=1; tileHP[MH-1][x]=TILE_MAX_HP; tileHP[MH-2][x]=TILE_MAX_HP; }
  if(crashDone&&cinT>180){ gState='PLAY'; cinT=0; }
}

// ── EXTRACT: boss drops ship, players auto-board, ship lifts ──
function uExtract(){
  extractTimer++;
  if(!extractShip) return;
  const es=extractShip;
  if(!es.landed){
    es.vy+=.25; es.y+=es.vy; es.angle+=es.av||0; if(es.av) es.av*=.92;
    const flr=MH*TH-TH*2-30;
    if(es.y>=flr){ es.y=flr; es.vy=0; es.landed=true; es.av=0; es.angle=0; fx(es.x+28,es.y+22,20,P.flame,4,3); shake=12; }
    return;
  }

  const targetX=es.x+28;
  let allBoarded=true;

  for(const p of players){
    if(p.boarded) continue;
    allBoarded=false;

    // Auto-walk — try to jump over obstacles every 60 frames if stuck
    const dir=targetX>p.x+PW/2?1:-1;
    p.vx=dir*2.5;
    // Jump if on ground and still far from ship (clears debris/platforms in the way)
    if(p.onGround&&Math.abs(p.x+PW/2-targetX)>30&&extractTimer%50===0){
      p.vy=PJMP*.8;
    }
    p.step(.45); checkDustLanding(p);
    p.x=clamp(p.x,TW+1,W-TW-PW-1);

    // Board if close enough (wider radius: 30px) OR timeout after 5s of trying
    const close=Math.abs(p.x+PW/2-targetX)<30;
    const timeout=extractTimer>300; // 5 seconds — force board even if stuck
    if(close||timeout){
      p.boarded=true;
      if(close) fx(p.x+PW/2,p.y,10,p.col.m,3,2);
    }
  }

  if(allBoarded&&extractTimer>60) es.lifting=true;

  if(es.lifting){
    es.vy=lerp(es.vy||0,-8,.06);
    es.y+=es.vy;
    if(gFrame%3===0) fx(es.x+rnd(10,46),es.y+45,2,P.flame,3,2);
    if(es.y<-100){
      saveToPersist();
      for(const p of players) p.coins+=20;
      levelNum++;
      randomLvlPalette();
      warpTimer=0;
      warpStars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,len:rnd(4,30),spd:rnd(8,24)}));
      storeTimer=0;
      gState='WARP';
    }
  }
}

function uWarp(){
  warpTimer++;
  if(warpTimer===1) fetchLeaderboard(); // pre-fetch
  if(warpTimer>60) storeTimer++;
  if(storeTimer>60&&(jp('Enter')||jp('KeyR')||jp('KeyN'))){
    initLevel(false);
  }
  if(storeTimer>60) uStoreBuy();
}

// ── PLAY ─────────────────────────────────────────────────
const REVIVE_HP      = 30;  // HP given to dead player on revive
const REVIVE_COST    = 20;  // HP taken from reviver
const REVIVE_RANGE   = 14;  // pixel distance to trigger
const REVIVE_TIME    = 90;  // frames the reviver must stand near dead (1.5s)

function uPlay(){
  if(!bossSpawned){ if(anyMoved) bossCountdown--; if(bossCountdown<=0) spawnBoss(); }
  for(const p of players){
    if(p.hp>0) uPlayer(p);
    else       uDeadPlayer(p); // keep dead player physics running (gravity)
  }
  if(bossSpawned&&boss&&boss.hp>0) uBoss();

  // ── REVIVE CHECK (2 players only) ──────────────────────
  if(numPlayers===2){
    const [p0,p1]=players;
    // Check both directions: alive reviving dead
    for(const [alive,dead] of [[p0,p1],[p1,p0]]){
      if(alive.hp<=0||dead.hp>0) continue;
      const dist=Math.abs((alive.x+PW/2)-(dead.x+PW/2));
      if(dist<REVIVE_RANGE+PW){
        // Start or advance revive timer
        dead.reviveTimer=(dead.reviveTimer||0)+1;
        if(dead.reviveTimer>=REVIVE_TIME){
          // Revive!
          dead.hp=REVIVE_HP;
          dead.iframes=120;
          dead.reviveTimer=0;
          // Cost to reviver
          alive.hp=Math.max(1, alive.hp-REVIVE_COST);
          fx(dead.x+PW/2,dead.y+PH/2, 20, dead.col.m, 5, 3);
          fx(dead.x+PW/2,dead.y+PH/2, 10, P.hpG,      3, 2);
          sndRevive();
          shake=Math.max(shake, 8);
        }
      } else {
        dead.reviveTimer=0;
      }
    }
  }

  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    const tx=Math.floor(b.x/TW), ty=Math.floor(b.y/TH);
    if(b.life<=0){ fx(b.x,b.y,3,P.bullet,2,1); pBullets.splice(i,1); continue; }
    if(solid(tx,ty)){ damageTile(tx,ty); fx(b.x,b.y,3,P.bullet,2,1); pBullets.splice(i,1); }
  }
  for(let i=bBullets.length-1;i>=0;i--){
    const b=bBullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||solid(Math.floor(b.x/TW),Math.floor(b.y/TH))) bBullets.splice(i,1);
  }
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i]; d.bob=(d.bob||0)+.08; d.step(.3);
    for(const p of players){
      if(p.hp>0&&d.hits(p)){ applyDrop(p,d.type); fx(d.x+6,d.y+6,14,dropCol(d.type),4,2); drops.splice(i,1); break; }
    }
  }
  if(bossSpawned&&boss&&boss.hp<=0&&gState==='PLAY'){
    sndLevelEnd(); sndExplode();
    const bcx=boss.x+BW/2;
    extractShip={x:bcx-28,y:boss.y-60,vy:2,av:0,landed:false,lifting:false};
    for(const p of players) p.boarded=false;
    extractTimer=0; gState='EXTRACT';
  }
  if(players.length>0&&players.every(p=>p.hp<=0)){
    sndDeath();
    gState='DEAD';
  }
}

// Dead player — apply gravity so they fall to floor, then stay there
function uDeadPlayer(p){
  if(p.onGround) return;
  p.vy=Math.min(p.vy+0.45,18);
  p.y+=p.vy;
  // Basic floor check only
  const bot=p.y+p.h-1, l=p.x+2, r=p.x+p.w-3;
  const anyBot=(px,py)=>{ const tx=Math.floor(px/TW),ty=Math.floor(py/TH); return solidFull(tx,ty)||solidOneWayTop(tx,ty); };
  if(p.vy>=0&&(anyBot(l,bot)||anyBot(r,bot))){ p.y=Math.floor(bot/TH)*TH-p.h; p.onGround=true; p.vy=0; }
  checkDustLanding(p);
}

function uPlayer(p){
  const c=p.ctrl;
  p.vx=0;
  if(keys[c.left]){p.vx=-PSPD;p.facing=-1;}
  if(keys[c.right]){p.vx=PSPD;p.facing=1;}
  if(keys[c.aimCW])  p.aimAngle+=.065;
  if(keys[c.aimCCW]) p.aimAngle-=.065;
  p.aimAngle=((p.aimAngle+Math.PI)%(Math.PI*2))-Math.PI;
  p.facing=Math.cos(p.aimAngle)>0?1:-1;

  if(p.onGround){ p.coyote=8; p.jumpsLeft=p.maxJumps; }
  else if(p.coyote>0) p.coyote--;

  const wasOnGround=p.onGround;
  const freshJump=keys[c.jump]&&!p.jumpPressed;
  if(freshJump){
    if(p.coyote>0||p.onGround){ p.vy=PJMP; p.coyote=0; sndJump(false); }
    else if(p.jumpsLeft>0){ p.vy=PJMP*.88; p.jumpsLeft--; fx(p.x+PW/2,p.y+PH,6,p.col.m,2,2); sndJump(true); }
  }
  p.jumpPressed=keys[c.jump];
  if(!keys[c.jump]&&p.vy<-3) p.vy+=.8;

  // Parachute
  if(p.parachute&&keys[c.jump]&&p.vy>1.5&&!p.onGround){
    p.vy=lerp(p.vy,1.5,.18);
    if(gFrame%6===p.id){ fx(p.x+PW/2,p.y-2,1,P.para,1.5,2); if(gFrame%24===p.id*12) sndPara(); }
  }

  p.step(); checkDustLanding(p); p.x=clamp(p.x,TW+1,W-TW-PW-1);

  // Land sound — triggers once when first touching ground after being airborne
  if(p.onGround&&!wasOnGround&&p.vy===0) sndLand();

  p.shootCD--;
  if(keys[c.shoot]&&p.shootCD<=0){
    const pcx=p.x+PW/2, pcy=p.y+PH/2;
    const vx=Math.cos(p.aimAngle)*11, vy=Math.sin(p.aimAngle)*11;
    pBullets.push({x:pcx+vx*.5,y:pcy+vy*.5,vx,vy,life:70,pid:p.id,dmg:bulletDmg(p)});
    p.shootCD=shootCD(p);
    fx(pcx+vx*.9,pcy+vy*.9,2,p.dmgMult>1?P.dmgx:P.yellow,2,1);
    sndShoot();
  }

  if(p.iframes<=0){
    for(let i=bBullets.length-1;i>=0;i--){
      const b=bBullets[i];
      if(p.hits({x:b.x-b.r,y:b.y-b.r,w:b.r*2,h:b.r*2})){
        p.hp-=b.dmg||12; p.iframes=70; p.vx+=(p.x<b.x?-1:1)*4; p.vy=-3;
        fx(p.x+PW/2,p.y+PH/2,8,p.col.m,3,2); bBullets.splice(i,1); sndHit();
      }
    }
    // Boss solid collision
    if(boss&&boss.hp>0&&p.hits(boss)){
      const ox=Math.min(p.x+p.w-boss.x, boss.x+BW-p.x);
      const oy=Math.min(p.y+p.h-boss.y, boss.y+BH-p.y);
      const pushLeft =p.x<boss.x+BW/2;

      if(ox<oy){
        // Horizontal push — check if wall is right there (corner trap)
        const wallLeft  = p.x<=TW+PW+2;
        const wallRight = p.x+p.w>=W-TW-PW-2;
        const trapped = (pushLeft&&wallLeft)||((!pushLeft)&&wallRight);

        if(trapped){
          // Escape upward instead of being pinned
          p.y=boss.y-p.h-1; p.vy=-4; p.onGround=false;
        } else {
          if(pushLeft){ p.x=boss.x-p.w; } else { p.x=boss.x+BW; }
          p.vx=0;
        }
        if(p.iframes<=0){
          const dir=pushLeft?-1:1;
          p.hp-=18; p.iframes=90; p.vx=dir*5; p.vy=-4;
          fx(p.x+PW/2,p.y+PH/2,10,P.orange,4,2); shake=Math.max(shake,8); sndHit();
        }
      } else {
        if(p.y+p.h/2<boss.y+BH/2){ p.y=boss.y-p.h; p.vy=0; p.onGround=true; }
        else { if(p.iframes<=0){ p.hp-=12; p.iframes=60; p.vy=2; fx(p.x+PW/2,p.y,6,P.orange,3,2); sndHit(); } p.y=boss.y+BH; p.vy=Math.max(p.vy,1); }
      }
    }
  } else p.iframes--;
  // God mode: never die
  if(godMode && p.hp<=0) p.hp=1;
}

function uBoss(){
  pushDust(boss.x,BW);
  if(!boss.rising){
    boss.burstTimer++;
    if(boss.burstTimer>=BURST_INTERVAL&&boss.burstState==='NONE'){ boss.burstState='WINDUP'; boss.burstWindup=0; boss.burstTimer=0; sndBurst(); }
    if(boss.burstState==='WINDUP'){
      boss.burstWindup++; boss.vx*=.6;
      if(boss.burstWindup%6===0){ fx(boss.x+BW/2,boss.y+BH/2,10,'#ff0000',6,3); shake=Math.max(shake,4); }
      if(boss.burstWindup>=80){
        const bcx=boss.x+BW/2, bcy=boss.y+BH/2;
        for(let i=0;i<24;i++){ const a=(i/24)*Math.PI*2; bBullets.push({x:bcx,y:bcy,vx:Math.cos(a)*1.8,vy:Math.sin(a)*1.8,life:380,r:8,dmg:24,burst:true}); }
        boss.burstState='NONE'; shake=30; fx(bcx,bcy,60,'#ff2020',10,4);
      }
    }
  }
  if(boss.rising){
    boss.y=lerp(boss.y,boss.riseTarget,.065); boss.x=lerp(boss.x,(W-BW)/2,.04);
    if(boss.y<=boss.riseTarget+2){ boss.rising=false; fx(boss.x+BW/2,boss.y+BH,25,lvl.bossAcc,5,3); shake=20; }
    boss.lastX=boss.x; return;
  }
  if(boss.onGround) boss.jumpsLeft=2;
  const alive=players.filter(p=>p.hp>0); if(!alive.length) return;
  const tgt=alive.reduce((a,b)=>Math.hypot(a.x-boss.x,a.y-boss.y)<Math.hypot(b.x-boss.x,b.y-boss.y)?a:b);
  const pcx=tgt.x+PW/2, pcy=tgt.y+PH/2;
  const bcx=boss.x+BW/2, bcy=boss.y+BH/2;
  boss.facing=pcx<bcx?-1:1;
  if(boss.burstState!=='WINDUP'){
    boss.stateTimer--; boss.atkCD--; boss.jumpCD--;
    const moved=Math.abs(boss.x-boss.lastX);
    if(moved<.4) boss.stuckTimer++; else boss.stuckTimer=0;
    boss.lastX=boss.x;
    if(boss.stuckTimer>25){
      boss.stuckTimer=0;
      if(boss.jumpsLeft>0){ boss.vy=PJMP*.88; boss.jumpsLeft--; fx(boss.x+BW/2,boss.y+BH,10,lvl.bossAcc,4,2); }
      else { boss.chargeDir*=-1; boss.state='JUMP'; boss.stateTimer=rnd(40,80); boss.jumpCD=0; }
    }
    if(boss.stateTimer<=0){
      const r=Math.random(), rage=boss.hp<BMAXHP*.4;
      if(r<.28) boss.state='WALK'; else if(r<.50) boss.state='CHARGE'; else if(r<(rage?.65:.70)) boss.state='JUMP'; else boss.state='SHOOT';
      boss.stateTimer=rnd(50,110); boss.chargeDir=boss.facing;
      if(boss.state==='SHOOT') boss.atkCD=0;
    }
    if(boss.state==='WALK') boss.vx=lerp(boss.vx,boss.facing*2.4,.1);
    else if(boss.state==='CHARGE'){ boss.vx=lerp(boss.vx,boss.chargeDir*8,.15); if(boss.x<=TW+2||boss.x+BW>=W-TW-2){ boss.chargeDir*=-1; fx(boss.x+BW/2,boss.y+BH/2,8,lvl.bossAcc,3,2); } }
    else if(boss.state==='JUMP'){
      boss.vx=lerp(boss.vx,boss.facing*3.5,.12);
      if(boss.onGround&&boss.jumpCD<=0){ boss.vy=-13.5; boss.jumpCD=45; shake=Math.max(shake,5); sweep(60,180,'sawtooth',.14,.18); }
    }
    else if(boss.state==='SHOOT'){
      boss.vx*=.82;
      if(boss.atkCD<=0){
        const ang=Math.atan2(pcy-bcy,pcx-bcx), spread=boss.hp<BMAXHP*.5;
        for(const da of (spread?[-.28,0,.28]:[0])) bBullets.push({x:bcx,y:bcy,vx:Math.cos(ang+da)*5,vy:Math.sin(ang+da)*5,life:130,r:5,dmg:12});
        boss.atkCD=boss.hp<BMAXHP*.3?20:33;
        // Boss shoot sound — low chunky blip
        nz(.08,.04,null,600); sweep(220,120,'square',.07,.06);
      }
    }
  }
  boss.vx*=.87; boss.step(.5); boss.x=clamp(boss.x,TW+1,W-TW-BW-1);

  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];
    if(boss.hits({x:b.x-2,y:b.y-2,w:5,h:5})){
      boss.hp=Math.max(0,boss.hp-(b.dmg||10)); pBullets.splice(i,1);
      fx(b.x,b.y,4,P.hpR,2,2); shake=Math.max(shake,2); sndBossHit();
      boss.hitCounter++;
      // Double frequency drops (every 5 hits = coins, every 5% = HP)
      if(boss.hitCounter%5===0&&boss.hp>0) spawnDrop(bcx+rnd(-22,22),bcy-rnd(5,20),'COIN');
      if(!boss.dmgDropped&&boss.hp<=BMAXHP*.5&&boss.hp>0){ boss.dmgDropped=true; spawnDrop(bcx,bcy-25,'DMGX2'); shake=Math.max(shake,25); bBullets.length=0; }
      const pct=Math.floor((BMAXHP-boss.hp)/(BMAXHP*.05)); // every 5%
      if(pct>boss.phaseDrops&&boss.hp>0){ boss.phaseDrops=pct; spawnDrop(bcx+rnd(-15,15),bcy,'HP'); shake=Math.max(shake,12); }
    }
  }
}

function uDead(){
  // Handle name input for highscore
  if(scoreFormActive){
    for(const c of justPressed){
      if(c==='Enter'&&playerNameInput.trim().length>0){
        const mode=numPlayers===1?'solo':'duo';
        const lvl2=levelNum, coins=players.reduce((s,p)=>s+p.coins,0);
        submitScore(playerNameInput.trim(),mode,lvl2,coins);
        scoreFormActive=false;
      } else if(c==='Backspace') playerNameInput=playerNameInput.slice(0,-1);
      else if(c.startsWith('Key')&&playerNameInput.length<20) playerNameInput+=c.replace('Key','');
      else if(c.startsWith('Digit')&&playerNameInput.length<20) playerNameInput+=c.replace('Digit','');
      else if(c==='Space'&&playerNameInput.length<20) playerNameInput+=' ';
    }
    return; // block other input while typing
  }
  if(!scoreFormActive&&!scoreSubmitted&&!scoreSubmitting){
    if(jp('KeyS')){ scoreFormActive=true; fetchLeaderboard(); return; }
  }
  if(jp('KeyR')){ resetPersist(); initLevel(false); }
  if(jp('Escape')||jp('KeyM')){ resetPersist(); stopMusic(); init(); }
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
function draw(){
  ctx.save();
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  // Scale everything so game coords stay in 800×450 space, rendered at native DPI
  ctx.scale(SCALE*DPR, SCALE*DPR);
  if(shake>0) ctx.translate((Math.random()-.5)*shake*1.1,(Math.random()-.5)*shake*.7);
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,P.bg); grad.addColorStop(1,'#0d051e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  dStars();

  if(gState==='MENU') dMenu();
  else if(gState==='CIN_SPACE') dCinSpace();
  else if(gState==='CIN_ORBIT') dCinOrbit();
  else if(gState==='CIN_PAN'){ ctx.save(); ctx.translate(-camX,0); dMap(); ctx.restore(); dCinBars('SUPERFÍCIE DE KETH-9','ZONA SEGURA: NENHUMA'); }
  else if(gState==='CIN_CRASH'){ dMap(); dDustPiles(); dCrash(); dCinBars('CONTROLO PERDIDO','IMPACTO IMINENTE!'); }
  else if(gState==='PLAY'||gState==='DEAD'){
    dMap(); dDustPiles();
    for(const d of drops) dDrop(d);
    for(const b of bBullets) dBBullet(b);
    for(const b of pBullets) dPBullet(b);
    if(bossSpawned&&boss) dBoss();
    for(const p of players) dPlayer(p);
    dHUD();
  }
  else if(gState==='EXTRACT'){
    dMap(); dDustPiles();
    for(const p of players) dPlayer(p);
    dExtractScene();
  }
  else if(gState==='WARP'||gState==='STORE'){
    dWarpScene();
  }
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/22)*.9;
    ctx.fillStyle=p.col; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
  if(gState==='DEAD') dDead();
  dCRTOverlay();
  dConsole();
  ctx.restore();
}

function dStars(){
  for(const s of stars){
    ctx.globalAlpha=.3+s.b*.7*(.8+.2*Math.sin(gFrame*.04+s.x));
    ctx.fillStyle=P.star; ctx.fillRect(s.x,s.y,s.s,s.s);
  }
  ctx.globalAlpha=1;
}

// ── ZX SPECTRUM LOADING BORDER (menu) ────────────────────
function dZXBorder(){
  const BW=46; // border width px (game coords)
  const SH=8;  // stripe height
  // ZX classic colours: bright yellow and deep blue
  const COL=['#FFE600','#0007CF'];
  const nStripes=Math.ceil(H/SH)+2;
  const phase=Math.floor(gFrame/4)%2; // slow alternating animation
  for(let i=0;i<nStripes;i++){
    const y=i*SH;
    const c=COL[(i+phase)%2];
    ctx.fillStyle=c;
    ctx.fillRect(0,y,BW,SH);          // left border
    ctx.fillRect(W-BW,y,BW,SH);       // right border
    ctx.fillRect(BW,y,W-BW*2,Math.min(SH,1)); // top/bottom 1px grid line (subtle)
  }
  // Top and bottom border strips
  for(let i=0;i<Math.ceil(BW/SH);i++){
    const x=i*SH;
    const c=COL[(i+phase)%2];
    ctx.fillStyle=c;
    ctx.fillRect(BW+x,0,SH,BW);       // top
    ctx.fillRect(BW+x,H-BW,SH,BW);   // bottom
  }
  // Black inner frame line separating border from content
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.strokeRect(BW+1,BW+1,W-BW*2-2,H-BW*2-2);
  ctx.globalAlpha=1;
}

// ── CRT OVERLAY: vignette + RGB fringe + rounded mask ────
function dCRTOverlay(){
  // 1. Vignette — stronger at corners
  const vig=ctx.createRadialGradient(W*.5,H*.5,H*.28,W*.5,H*.5,H*.88);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(0.65,'rgba(0,0,0,0.08)');
  vig.addColorStop(1,'rgba(0,0,0,0.52)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // 2. RGB chromatic aberration at borders — red left, blue right
  const rgbW=70;
  const redG=ctx.createLinearGradient(0,0,rgbW,0);
  redG.addColorStop(0,'rgba(255,0,20,0.055)');
  redG.addColorStop(1,'rgba(255,0,20,0)');
  ctx.fillStyle=redG; ctx.fillRect(0,0,rgbW,H);

  const blueG=ctx.createLinearGradient(W,0,W-rgbW,0);
  blueG.addColorStop(0,'rgba(0,30,255,0.055)');
  blueG.addColorStop(1,'rgba(0,30,255,0)');
  ctx.fillStyle=blueG; ctx.fillRect(W-rgbW,0,rgbW,H);

  // 3. Rounded corner mask — CRT screen shape
  const R=18;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.rect(0,0,W,H);
  ctx.roundRect(0,0,W,H,R);
  ctx.fill('evenodd');

  ctx.globalAlpha=1;
}

// ════════════════════════════════════════════════════════
//  SCI-FI FRAME — industrial military button style
//  (ref: dark frame, amber accent lines, corner brackets,
//   deep red panel, pulsing LED — as per design reference)
// ════════════════════════════════════════════════════════
function dSciFrame(x,y,w,h,opts={}){
  // opts: {selected, owned, col, pulse, ledCol, flat}
  const sel=opts.selected||false;
  const owned=opts.owned||false;
  const accentCol=owned?'#20a040': sel?'#d07010':'#603808';
  const ledR=opts.ledCol||(owned?'#20ff50':sel?'#ff3010':'#441008');
  const p=sel?(0.7+Math.sin(gFrame*.14)*.3):0;

  // ── Outer shell (very dark, almost black) ──────────────
  ctx.fillStyle='#090a0f'; ctx.fillRect(x,y,w,h);

  // ── Amber/accent horizontal lines top + bottom ─────────
  ctx.fillStyle=accentCol;
  ctx.fillRect(x+12,y+1,w-24,2);          // top line
  ctx.fillRect(x+12,y+h-3,w-24,2);        // bottom line
  // thinner inner reflection
  ctx.fillStyle=sel?'rgba(220,110,20,.25)':'rgba(80,40,8,.18)';
  ctx.fillRect(x+14,y+4,w-28,1);
  ctx.fillRect(x+14,y+h-5,w-28,1);

  // ── Corner bracket pieces ──────────────────────────────
  const cb=10; // bracket size
  const cInner=5;
  const cbCol='#14151c';
  const cDot=sel?'#403020':'#1c1c26';
  for(const [cx2,cy2] of [[x,y],[x+w-cb,y],[x,y+h-cb],[x+w-cb,y+h-cb]]){
    ctx.fillStyle=cbCol; ctx.fillRect(cx2,cy2,cb,cb);
    ctx.fillStyle=cDot;  ctx.fillRect(cx2+2,cy2+2,cInner,cInner);
    // accent dot
    ctx.fillStyle=accentCol; ctx.fillRect(cx2+3,cy2+3,3,3);
  }

  // ── Side rails with rivets ─────────────────────────────
  ctx.fillStyle='#0d0e16';
  ctx.fillRect(x,y+cb,5,h-cb*2);
  ctx.fillRect(x+w-5,y+cb,5,h-cb*2);
  ctx.fillStyle=sel?'#604020':'#252530';
  for(let ry=y+cb+4;ry<y+h-cb-2;ry+=7){
    ctx.fillRect(x+1,ry,3,2);
    ctx.fillRect(x+w-4,ry,3,2);
  }

  // ── LED status indicator (top-right area) ─────────────
  const ledX=x+w-8, ledY=y+6;
  if(sel){
    ctx.globalAlpha=p*.35;
    ctx.fillStyle=ledR; ctx.beginPath(); ctx.arc(ledX,ledY,6,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.fillStyle=ledR; ctx.beginPath(); ctx.arc(ledX,ledY,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(ledX-.8,ledY-.8,1,0,Math.PI*2); ctx.fill();

  // ── Small bottom-left status bar ───────────────────────
  ctx.fillStyle='#12131a'; ctx.fillRect(x+7,y+h-7,16,3);
  ctx.fillStyle=owned?'#20ff50':sel?accentCol:'#301808';
  ctx.fillRect(x+7,y+h-7,owned?16:sel?10:4,3);

  // ── Inner face panel ──────────────────────────────────
  const fx2=x+6, fy=y+5, fw=w-12, fh=h-10;
  const panelGrad=ctx.createLinearGradient(fx2,fy,fx2,fy+fh);
  if(owned){
    panelGrad.addColorStop(0,'#082012'); panelGrad.addColorStop(.4,'#0c2c18'); panelGrad.addColorStop(1,'#051a0e');
  } else if(sel){ // canBuy — green, available
    panelGrad.addColorStop(0,'#082e10'); panelGrad.addColorStop(.35,'#0e4018'); panelGrad.addColorStop(.65,'#0c3a14'); panelGrad.addColorStop(1,'#051a0a');
  } else { // locked — dark brownish
    panelGrad.addColorStop(0,'#1e0c10'); panelGrad.addColorStop(.5,'#260e12'); panelGrad.addColorStop(1,'#180a0c');
  }
  ctx.fillStyle=panelGrad; ctx.fillRect(fx2,fy,fw,fh);

  // Subtle horizontal scan texture on face
  ctx.fillStyle='rgba(0,0,0,0.07)';
  for(let sy=fy+1;sy<fy+fh;sy+=3) ctx.fillRect(fx2,sy,fw,1);

  // Top highlight strip on face
  ctx.fillStyle=sel?'rgba(40,220,80,.07)':'rgba(255,255,255,.025)';
  ctx.fillRect(fx2,fy,fw,2);

  // Inner border
  ctx.strokeStyle=sel?'rgba(30,200,70,.5)':owned?'rgba(20,160,50,.4)':'rgba(100,40,20,.2)';
  ctx.lineWidth=1;
  ctx.strokeRect(fx2+.5,fy+.5,fw-1,fh-1);

  ctx.globalAlpha=1;
  return {fx:fx2, fy, fw, fh}; // return face bounds for text placement
}

// ── CINEMATICS ───────────────────────────────────────────
// ── DRAW: CIN_SPACE — single clean lateral, Flashback-style ─
function dCinSpace(){
  // Pure black background
  ctx.fillStyle='#000008'; ctx.fillRect(0,0,W,H);
  // Sparse static stars only
  ctx.fillStyle='#ffffff';
  for(const s of stars){
    if(s.b<.55) continue;
    ctx.globalAlpha=s.b*.45;
    ctx.fillRect(s.x,s.y,s.s,s.s);
  }
  ctx.globalAlpha=1;

  // Enemy cruiser — large wedge silhouette, right side
  const cruiserX=Math.max(W-200, W-60-cinT*1.1);
  ctx.save(); ctx.translate(cruiserX+100,H*.4);
  ctx.fillStyle='#110808';
  ctx.beginPath(); ctx.moveTo(-110,0); ctx.lineTo(-65,-20); ctx.lineTo(65,-16);
  ctx.lineTo(88,0); ctx.lineTo(65,16); ctx.lineTo(-65,20); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1e0c0c';
  ctx.beginPath(); ctx.moveTo(-90,0); ctx.lineTo(-52,-12); ctx.lineTo(55,-10);
  ctx.lineTo(68,0); ctx.lineTo(55,10); ctx.lineTo(-52,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#160a0a'; ctx.fillRect(-22,-30,44,16);
  ctx.fillStyle='#221010'; ctx.fillRect(-16,-28,32,11);
  // Engine glow ports
  const eg=gFrame%8<4?'#b02808':'#702008';
  for(let i=-1;i<=1;i++){ ctx.fillStyle=eg; ctx.fillRect(-114,i*10-4,9,9); }
  ctx.globalAlpha=.35+Math.sin(gFrame*.08)*.15;
  ctx.fillStyle='#ff3000'; ctx.fillRect(80,-4,5,8);
  ctx.globalAlpha=1;
  ctx.restore();

  // Laser bolts — long Star Wars-style thin lines
  for(const s of cShots){
    if(!s.alive) continue;
    // Glow + core + white centre
    ctx.globalAlpha=.2; ctx.fillStyle='#ff0000'; ctx.fillRect(s.x-80,s.y-4,160,8);
    ctx.globalAlpha=.8; ctx.fillStyle='#ff3030'; ctx.fillRect(s.x-68,s.y-2,136,4);
    ctx.globalAlpha=1;  ctx.fillStyle='#ff9090'; ctx.fillRect(s.x-54,s.y-1,108,2);
    ctx.fillStyle='#ffffff'; ctx.fillRect(s.x-38,s.y,76,1);
  }

  // Our ship — tumbling or flying
  if(!cs.exploding){
    dShipSilhouette(cs.x,cs.y,cs.angle,cs.scale,false);
  } else {
    dShipSilhouette(cs.x,cs.y,cs.tumbleAngle||cs.angle,cs.scale,true);
    // Screen flash on first frames of impact
    if(cs.explodeT<12){
      ctx.globalAlpha=Math.max(0,(12-cs.explodeT)/12)*.9;
      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
    }
  }

  dCinBars('SECTOR 7 — INTERCEPÇÃO','PROPULSÃO CRÍTICA — EVASÃO DE EMERGÊNCIA');
}

  ctx.beginPath(); ctx.moveTo(2,10); ctx.lineTo(-20,28); ctx.lineTo(-26,15); ctx.lineTo(-8,9); ctx.closePath(); ctx.fill();

// ── PLANET with continents (level-palette coloured) ───────
function dPlanet(px,py,pr){
  // Atmosphere glow
  const atm=ctx.createRadialGradient(px,py,pr*.7,px,py,pr*1.5);
  atm.addColorStop(0,'rgba(0,0,0,0)');
  atm.addColorStop(0.5,`${lvl.bossAcc}44`);
  atm.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=atm; ctx.beginPath(); ctx.arc(px,py,pr*1.5,0,Math.PI*2); ctx.fill();

  // Ocean (base circle — use level ground colour)
  const ocean=ctx.createRadialGradient(px-pr*.3,py-pr*.3,0,px,py,pr);
  ocean.addColorStop(0,lvl.groundAcc);
  ocean.addColorStop(0.6,lvl.ground);
  ocean.addColorStop(1,hsl(lvl.groundHue,50,8));
  ctx.fillStyle=ocean; ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();

  // Continents — seeded blobs
  ctx.save(); ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.clip();
  const contCol=hsl((lvl.groundHue+40)%360,45,38);
  const contHi =hsl((lvl.groundHue+60)%360,40,52);
  const contSeed=levelNum*7+3;
  // Generate ~5 continents with Perlin-ish blob shapes
  for(let c=0;c<6;c++){
    const cx2=px+(Math.sin(contSeed+c*1.9)*pr*.55);
    const cy2=py+(Math.cos(contSeed+c*1.3)*pr*.45);
    const cr=pr*(0.12+((contSeed*c+7)%13)*.018);
    // Blob outline with 8 control points
    ctx.beginPath();
    for(let a=0;a<Math.PI*2;a+=Math.PI/4){
      const jitter=cr*(0.7+((contSeed+c+a*3)%7)*.05);
      const bx2=cx2+Math.cos(a)*jitter, by2=cy2+Math.sin(a)*jitter;
      a===0?ctx.moveTo(bx2,by2):ctx.lineTo(bx2,by2);
    }
    ctx.closePath();
    ctx.fillStyle=contCol; ctx.fill();
    // Highlight on continent
    ctx.fillStyle=contHi; ctx.globalAlpha=.4;
    ctx.beginPath(); ctx.arc(cx2-cr*.2,cy2-cr*.2,cr*.4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // Ice caps
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(px,py-pr*.78,pr*.28,pr*.14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px,py+pr*.8,pr*.18,pr*.08,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Dark side shadow
  const drk=ctx.createRadialGradient(px+pr*.45,py+pr*.28,0,px+pr*.5,py+pr*.35,pr*1.12);
  drk.addColorStop(0,'rgba(0,0,0,0)'); drk.addColorStop(1,'rgba(0,0,0,0.78)');
  ctx.fillStyle=drk; ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();

  // Specular highlight
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.ellipse(px-pr*.3,py-pr*.28,pr*.22,pr*.14,-0.5,0,Math.PI*2); ctx.fill();
}

// ── WARP SCENE + STORE OVERLAY ────────────────────────────
function dWarpScene(){
  // Black background
  ctx.fillStyle='#000008'; ctx.fillRect(0,0,W,H);
  // Warp star streaks
  const speed=Math.min(1,(warpTimer/40));
  for(const s of warpStars){
    s.x-=s.spd*speed;
    if(s.x<-s.len*speed) s.x=W+4;
    const len=s.len*speed+2;
    const alpha=.2+speed*.7;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+len,s.y); ctx.stroke();
    // Colour tint at high speed
    if(speed>.6){
      ctx.strokeStyle='#a0c0ff'; ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(s.x-2,s.y-1); ctx.lineTo(s.x+len*.6,s.y-1); ctx.stroke();
    }
  }
  ctx.globalAlpha=1;

  // Store overlay (after 1s)
  if(storeTimer>0) dStore();
}

// ── MAP ──────────────────────────────────────────────────
const CSEGS=[[[2,4,7,9],[5,2,9,8],[8,4,4,9],[3,6,9,4]],[[1,3,6,8],[4,1,10,6],[7,3,3,8],[2,5,8,3],[1,7,6,12],[5,9,11,5]]];
function dMap(){
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++){
    if(!map[y][x]) continue;
    const px=x*TW, py=y*TH;
    ctx.fillStyle=lvl.ground; ctx.fillRect(px,py,TW,TH);
    if(!map[y-1]?.[x]){ ctx.fillStyle=lvl.groundTop; ctx.fillRect(px,py,TW,3); ctx.fillStyle=lvl.groundAcc; ctx.fillRect(px,py,TW,1); if((x*3+y*7)%5===0){ctx.fillStyle=lvl.groundAcc;ctx.fillRect(px+3,py+4,2,1);} }
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(px+TW-1,py,1,TH); ctx.fillRect(px,py+TH-1,TW,1);
    const hp=tileHP[y][x];
    if(hp>0&&hp<TILE_MAX_HP){
      const seed=(x*31+y*17)%4, nc=hp===1?2:1;
      ctx.globalAlpha=hp===1?.85:.5; ctx.strokeStyle=hp===1?lvl.crack2:lvl.crack1; ctx.lineWidth=1;
      const arr=CSEGS[hp===1?1:0];
      for(let c=0;c<nc;c++){const s=arr[(seed+c)%arr.length]; ctx.beginPath(); ctx.moveTo(px+s[0],py+s[1]); ctx.lineTo(px+s[2],py+s[3]); ctx.stroke();}
      if(hp===1){ctx.globalAlpha=.3;ctx.fillStyle='#000';ctx.fillRect(px,py,TW,TH);}
      ctx.globalAlpha=1;
    }
  }
}
function dDustPiles(){

// ── PLAYER ───────────────────────────────────────────────
function dPlayer(p){
  const x=Math.round(p.x), y=Math.round(p.y);
  const isDead=p.hp<=0;

  // ── Dead player — blink and revive indicator ──────────
  if(isDead){
    const blink=Math.floor(gFrame/18)%2===0;
    if(!blink) return; // invisible half the time
    ctx.save(); ctx.globalAlpha=0.45;
    // Flattened / slumped body
    ctx.fillStyle=p.col.d; ctx.fillRect(x,y+PH-6,PW,6);
    ctx.fillStyle='#333344'; ctx.fillRect(x+1,y+PH-5,PW-2,4);
    // Skull / X eyes
    ctx.fillStyle=p.col.m; ctx.fillRect(x+2,y+PH-12,PW-4,7);
    ctx.fillStyle='#ff2020'; ctx.font='6px monospace';
    ctx.textAlign='center'; ctx.fillText('✕',x+PW/2,y+PH-7); ctx.textAlign='left';
    ctx.restore();

    // Revive progress bar (shows when ally is near)
    const prog=(p.reviveTimer||0)/REVIVE_TIME;
    if(prog>0){
      const bw=PW+12, bx=x-6, by2=y+PH-18;
      // Background
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx,by2,bw,5);
      // Fill
      const g=ctx.createLinearGradient(bx,0,bx+bw,0);
      g.addColorStop(0,P.hpG); g.addColorStop(1,'#80ffff');
      ctx.fillStyle=g; ctx.fillRect(bx,by2,bw*prog,5);
      // Pulse frame
      ctx.strokeStyle=p.col.m; ctx.lineWidth=1; ctx.strokeRect(bx,by2,bw,5);
      // "REVIVE" label
      ctx.fillStyle=P.hpG; ctx.font='6px monospace'; ctx.textAlign='center';
      ctx.fillText('REVIVER',x+PW/2,by2-2); ctx.textAlign='left';
    }
    return;
  }

  const f=p.facing, ang=p.aimAngle, ghost=p.iframes>0&&gFrame%6<3;
  const pcx=x+PW/2, pcy=y+PH/2-1;
  const isPara=p.parachute&&keys[p.ctrl.jump]&&p.vy>1.5&&!p.onGround;
  ctx.save(); if(ghost) ctx.globalAlpha=.35;
  if(p.onGround){ctx.fillStyle='rgba(0,0,0,.28)';ctx.fillRect(x+1,y+PH,PW-2,2);}
  ctx.fillStyle=p.col.d; ctx.fillRect(x+1,y+5,PW-2,PH-5);
  ctx.fillStyle=p.col.m; ctx.fillRect(x+2,y+5,PW-4,PH-7);
  ctx.fillStyle=p.col.m; ctx.fillRect(x+1,y,PW-2,7);
  ctx.fillStyle='#002828'; ctx.fillRect(x+2+(f>0?2:0),y+1,4,3);
  ctx.fillStyle='#40ffff'; ctx.fillRect(x+2+(f>0?2:0),y+1,4,1);
  ctx.fillStyle=p.col.d; ctx.fillRect(x+1,y,1,7); ctx.fillRect(x+PW-2,y,1,7);
  if(p.id===1){ctx.fillStyle=P.p2;ctx.fillRect(x+PW/2-1,y-3,3,2);}
  ctx.fillStyle='#606080'; ctx.fillRect(f>0?x:x+PW-3,y+5,3,8);
  // Parachute
  if(isPara){
    const pw2=22, ph2=12, px2=x+PW/2-pw2/2, py2=y-ph2-4;
    ctx.fillStyle=P.paraD; ctx.fillRect(px2,py2,pw2,ph2);
    ctx.fillStyle=P.para; ctx.fillRect(px2+1,py2+1,pw2-2,ph2-3);
    ctx.strokeStyle=P.paraD; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px2+4,py2+ph2); ctx.lineTo(x+2,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px2+pw2-4,py2+ph2); ctx.lineTo(x+PW-3,y); ctx.stroke();
  }
  // Gun arm
  ctx.save(); ctx.translate(pcx,pcy+2); ctx.rotate(ang);
  ctx.fillStyle=p.col.d; ctx.fillRect(0,-2,10,4);
  ctx.fillStyle=p.dmgMult>1?P.dmgx:P.gun; ctx.fillRect(4,-2,8,4);
  ctx.fillStyle='#505060'; ctx.fillRect(10,-1,3,2);
  ctx.fillStyle=(keys[p.ctrl.shoot]&&p.shootCD<4)?(p.dmgMult>1?P.dmgx:P.yellow):'#404050'; ctx.fillRect(13,-1,2,2);
  ctx.restore();
  const walk=p.onGround&&Math.abs(p.vx)>.5, lp=Math.floor(gFrame/7)%2;
  ctx.fillStyle=p.col.d;
  if(walk){ctx.fillRect(x+1,y+PH-4+(lp?0:2),3,4);ctx.fillRect(x+PW-4,y+PH-4+(lp?2:0),3,4);}
  else    {ctx.fillRect(x+1,y+PH-4,3,4);ctx.fillRect(x+PW-4,y+PH-4,3,4);}
  ctx.fillStyle='#3a3a4a'; ctx.fillRect(x+(f>0?PW-5:1),y+PH-1,5,3);
  if(!p.onGround&&p.jumpsLeft<p.maxJumps&&gFrame%4<2&&!isPara){ctx.fillStyle=P.flame;ctx.fillRect(f>0?x-1:x+PW-2,y+8,3,5);}
  ctx.restore();
  // Aim orbital
  const OR=20; ctx.save(); ctx.translate(pcx,pcy+2);
  ctx.globalAlpha=ghost?.06:.20; ctx.strokeStyle=p.col.m; ctx.lineWidth=.8;
  ctx.setLineDash([3,4]); ctx.beginPath(); ctx.arc(0,0,OR,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
  ctx.globalAlpha=ghost?.08:.55; ctx.strokeStyle=p.col.m; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*OR,Math.sin(ang)*OR); ctx.stroke();
  ctx.globalAlpha=ghost?.06:.88; ctx.fillStyle=p.dmgMult>1?P.dmgx:p.col.m;
  ctx.fillRect(Math.cos(ang)*OR-2,Math.sin(ang)*OR-2,4,4);
  if(p.dmgMult>1){ctx.globalAlpha=(.4+Math.sin(gFrame*.2)*.3)*.28;ctx.strokeStyle=P.dmgx;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,OR+4,0,Math.PI*2);ctx.stroke();}
  // Revive proximity pulse — shows alive player is in revive range of dead ally
  if(numPlayers===2){
    const ally=players.find(a=>a!==p&&a.hp<=0);
    if(ally){
      const dist=Math.abs((p.x+PW/2)-(ally.x+PW/2));
      if(dist<REVIVE_RANGE+PW){
        const prog=(ally.reviveTimer||0)/REVIVE_TIME;
        ctx.globalAlpha=0.25+Math.sin(gFrame*.2)*.15;
        ctx.strokeStyle=P.hpG; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(pcx,pcy,OR+6+prog*4,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
  }
  ctx.restore(); ctx.globalAlpha=1;
  if(!p.onGround&&p.jumpsLeft>0&&!isPara){
    for(let j=0;j<p.jumpsLeft;j++){ctx.fillStyle=p.col.m;ctx.globalAlpha=.75;ctx.fillRect(x+PW/2-p.jumpsLeft*3+j*6,y-6,4,4);}
    ctx.globalAlpha=1;
  }
  // Badges
  let by2=y-14;
  if(p.weaponLvl>0){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(x-2,by2,PW+4,7);ctx.fillStyle=P.gold;ctx.font='6px monospace';ctx.textAlign='center';ctx.fillText('W'+p.weaponLvl,x+PW/2,by2+6);ctx.textAlign='left';by2-=8;}
  if(p.fireRate){ctx.fillStyle='rgba(40,0,0,.8)';ctx.fillRect(x-2,by2,PW+4,7);ctx.fillStyle=P.fire;ctx.font='6px monospace';ctx.textAlign='center';ctx.fillText('>>',x+PW/2,by2+6);ctx.textAlign='left';by2-=8;}
  if(p.parachute){ctx.fillStyle='rgba(0,0,50,.8)';ctx.fillRect(x-2,by2,PW+4,7);ctx.fillStyle=P.para;ctx.font='6px monospace';ctx.textAlign='center';ctx.fillText('⛱',x+PW/2,by2+6);ctx.textAlign='left';}
}

// ── BOSS ─────────────────────────────────────────────────
function dBoss(){
  if(!boss) return;
  const x=Math.round(boss.x), y=Math.round(boss.y);
  const f=boss.facing, rage=boss.hp<BMAXHP*.4;
  const isBursting=boss.burstState==='WINDUP';
  const burstP=isBursting?(.5+Math.sin(gFrame*.4)*.5):0;
  const blink=(rage&&gFrame%8<4)||(isBursting&&gFrame%4<2);
  const pulse=Math.sin(gFrame*.1)*.5+.5;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(x+4,y+BH,BW-8,4);
  ctx.fillStyle=blink?hsl(lvl.bossHue,80,65):lvl.bossDark; ctx.fillRect(x,y,BW,BH);
  ctx.fillStyle=blink?hsl(lvl.bossHue,70,55):lvl.bossMain; ctx.fillRect(x+2,y+2,BW-4,BH-4);
  if(isBursting){ctx.globalAlpha=burstP*.5;ctx.fillStyle='#ff0000';ctx.fillRect(x,y,BW,BH);ctx.globalAlpha=1;}
  ctx.fillStyle=blink?hsl(lvl.bossHue,80,50):lvl.bossDark;
  ctx.fillRect(x+6,y+14,10,14); ctx.fillRect(x+BW-16,y+14,10,14); ctx.fillRect(x+18,y+12,BW-36,8);
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(x+10,y+22,BW-20,14);
  ctx.fillStyle=lvl.bossDark; ctx.fillRect(x-6,y+4,10,14); ctx.fillRect(x+BW-4,y+4,10,14);
  ctx.fillStyle=lvl.bossMain; ctx.fillRect(x-5,y+5,8,12); ctx.fillRect(x+BW-3,y+5,8,12);
  ctx.fillStyle=lvl.bossDark; ctx.fillRect(x-8,y+10,10,22); ctx.fillRect(x+BW-2,y+10,10,22);
  ctx.fillStyle=rage||isBursting?hsl(lvl.bossHue,90,60):lvl.bossAcc;
  for(let c=0;c<3;c++){ctx.fillRect(x-10+c*3,y+30,2,7);ctx.fillRect(x+BW+c*3,y+30,2,7);}
  ctx.fillStyle=lvl.bossDark; ctx.fillRect(x+8,y+BH-2,14,8); ctx.fillRect(x+BW-22,y+BH-2,14,8);
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(x+8,y+BH+5,16,4); ctx.fillRect(x+BW-24,y+BH+5,16,4);
  const eo=f>0?4:-4;
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x+10,y+10,12,8); ctx.fillRect(x+BW-22,y+10,12,8);
  ctx.fillStyle=isBursting?'#ffffff':lvl.bossEye; ctx.fillRect(x+11+eo,y+11,10,6); ctx.fillRect(x+BW-21+eo,y+11,10,6);
  ctx.fillStyle=isBursting?'#ff0000':(rage?hsl(lvl.bossHue,100,50):hsl(lvl.bossHue,80,40));
  ctx.fillRect(x+14+eo+(f>0?3:0),y+12,4,4); ctx.fillRect(x+BW-18+eo+(f>0?3:0),y+12,4,4);
  ctx.fillStyle='rgba(0,0,0,.8)'; ctx.fillRect(x+10,y+34,BW-20,isBursting?14:9);
  if(!isBursting){ctx.fillStyle='#dcdcdc'; for(let t=0;t<5;t++) ctx.fillRect(x+12+t*(BW-24)/5,y+34,4,4);}
  else {ctx.fillStyle=hsl(lvl.bossHue,80,50); ctx.fillRect(x+12,y+36,BW-24,10); const sh=(Math.random()-.5)*4; ctx.fillStyle=lvl.bossDark; ctx.fillRect(x-10+sh,y+10,10,22); ctx.fillRect(x+BW-2-sh,y+10,10,22);}
  ctx.fillStyle=rage||isBursting?lvl.bossAcc:lvl.bossDark;
  const spkSpd=isBursting?.25:.08;
  for(let s=0;s<5;s++){const sh=6+Math.sin(gFrame*spkSpd+s)*3; ctx.fillRect(x+8+s*9,y-sh,4,sh+1);}
  if(rage||isBursting){ctx.globalAlpha=(isBursting?burstP*.35:.12)+pulse*.08;ctx.fillStyle=isBursting?'#ff0000':lvl.bossAcc;ctx.fillRect(x-5,y-5,BW+10,BH+10);ctx.globalAlpha=1;}
  if(boss.rising){ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(x,y+BH,BW,H-y-BH);ctx.fillStyle=lvl.bossAcc;for(let r=0;r<4;r++){const ry=y+BH+r*14+(gFrame%14);if(ry<H)ctx.fillRect(x+4,ry,BW-8,5);}}
  if(!boss.rising&&!isBursting){
    const prog=(boss.hitCounter%5)/5;
    ctx.strokeStyle='rgba(255,200,0,.45)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x+BW/2,y-12,8,-Math.PI/2,-Math.PI/2+prog*Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,215,0,.75)'; ctx.font='6px monospace'; ctx.textAlign='center';
    ctx.fillText((boss.hitCounter%5)+'/5',x+BW/2,y-8); ctx.textAlign='left';
  }
  if(!boss.rising&&boss.burstState==='NONE'&&boss.burstTimer>BURST_INTERVAL*.7){

    ctx.beginPath(); ctx.arc(x+BW/2,y-12,12,-Math.PI/2,-Math.PI/2+bp*Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ── HUD ──────────────────────────────────────────────────
function dHUD(){
  for(let i=0;i<players.length;i++){
    const p=players[i], hx=i===0?10:W-134, hy=10, hw=120, hh=10;
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(hx-2,hy-2,hw+4,hh+4);

    ctx.fillStyle=hg; ctx.fillRect(hx,hy,hf,hh);
    ctx.fillStyle=P.white; ctx.font='7px "Courier New",monospace'; ctx.fillText(`P${i+1}  ${Math.ceil(p.hp)}/${p.maxHP}`,hx+3,hy+8);
    ctx.fillStyle=P.gold; ctx.fillText(`⬤ ${p.coins}`,hx,hy+22);
    let row=34;
    if(p.weaponLvl>0){ctx.fillStyle=P.goldD;ctx.fillText(`W${p.weaponLvl} +${p.weaponLvl*10}%`,hx,hy+row);row+=12;}
    if(p.fireRate){ctx.fillStyle=P.fire;ctx.fillText('>> CADÊNCIA',hx,hy+row);row+=12;}
    if(p.doubleJump){ctx.fillStyle=P.djump;ctx.fillText('◈ SALTO×2',hx,hy+row);row+=12;}
    if(p.parachute){ctx.fillStyle=P.para;ctx.fillText('⛱ PARA',hx,hy+row);row+=12;}
    if(p.dmgMult>1){ctx.globalAlpha=.7+Math.sin(gFrame*.2)*.3;ctx.fillStyle=P.dmgx;ctx.font='bold 8px "Courier New",monospace';ctx.fillText('✦ DMG x2',hx,hy+row);ctx.globalAlpha=1;}
  }
  if(bossSpawned&&boss&&boss.hp>0){
    const bw=320,bh=14,bx=(W-bw)/2,by=8;
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
    ctx.fillStyle=lvl.bossDark; ctx.fillRect(bx,by,bw,bh);
    const bf=Math.max(0,(bw-2)*boss.hp/BMAXHP), bg=ctx.createLinearGradient(bx,0,bx+bw,0), rage=boss.hp<BMAXHP*.4;
    bg.addColorStop(0,lvl.bossDark); bg.addColorStop(1,lvl.bossAcc);
    ctx.fillStyle=bg; ctx.fillRect(bx+1,by+1,bf,bh-2);
    for(let t=1;t<20;t++){ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(bx+bw*t/20-1,by,2,bh);}
    if(!boss.dmgDropped){ctx.fillStyle=P.dmgx;ctx.fillRect(bx+bw/2-1,by-3,2,bh+6);}
    if(boss.burstState==='WINDUP'){
      ctx.globalAlpha=.5+Math.sin(gFrame*.3)*.5; ctx.fillStyle='rgba(255,0,0,.4)'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#ff4040'; ctx.font='bold 9px "Courier New",monospace'; ctx.textAlign='center';
      ctx.fillText('⚠  BURST  ⚠',W/2,by+10); ctx.globalAlpha=1; ctx.textAlign='left';
    } else {
      ctx.fillStyle=P.white; ctx.font='bold 9px "Courier New",monospace'; ctx.textAlign='center';
      ctx.fillText(`☠ ALIEN OVERLORD  ${Math.ceil(boss.hp)} / ${BMAXHP}  [NÍV.${levelNum}]`,W/2,by+10); ctx.textAlign='left';
    }
  }
  if(!bossSpawned){
    // No popup — boss spawns silently when player moves
  }
  if(gFrame<260){
    const alpha=Math.max(0,(260-gFrame)/110); ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,H-46,W,46);
    ctx.fillStyle=P.white; ctx.font='8px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('P1: ← → Mover | ↑ ↓ Mira | AltGr Saltar | Ctrl Dir Disparar',W/2,H-28);
    if(numPlayers>1) ctx.fillText('P2: A D Mover | W S Mira | 1 Saltar | Q Disparar',W/2,H-13);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }
}

// ── STORE — 4 upgrades with pixel art icons ───────────────
function dStore(){
  ctx.fillStyle='rgba(4,2,16,.94)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.shadowBlur=0;
  ctx.fillStyle='#f0b500'; ctx.font='bold 20px Orbitron, monospace';
  ctx.fillText('▸ ARMERIA ◂',W/2,38);
  ctx.fillStyle='#6068a0'; ctx.font='9px "Share Tech Mono", monospace';
  ctx.fillText(`NÍVEL ${levelNum} COMPLETO  •  +20 MOEDAS BÓNUS`,W/2,56);

  // Layout: per player, 4 cards in a row
  const numP=numPlayers;
  const panelW=numP===1?760:374;
  const panelX=numP===1?20:8;
  const panelGap=numP===1?0:16;

  for(let pi=0;pi<numP;pi++){
    const p=players[pi];
    const px=panelX+pi*(panelW+panelGap);
    const py=68;

    // Panel outer frame (sci-fi style)
    dSciFrame(px,py,panelW,310,{selected:false,owned:false,col:p.col.m,ledCol:p.col.m});
    // Header text over panel
    ctx.fillStyle=p.col.m; ctx.font='bold 11px "Share Tech Mono",monospace'; ctx.textAlign='left';
    ctx.fillText(`P${pi+1}`,px+14,py+20);
    ctx.fillStyle=P.gold; ctx.font='bold 12px "Share Tech Mono",monospace';
    ctx.fillText(`⬤ ${p.coins}`,px+36,py+20);

    // 4 upgrade cards in 2×2 grid
    const cw=numP===1?180:170, ch=108, cgx=numP===1?8:6, cgy=6;
    const upgrades=[
      {key:p.ctrl.b1,cost:COST_WEAPON,col:P.gold,     owned:false,   label:'ARMA',   sub:WEAPON_NAMES[Math.min(p.weaponLvl+1,9)], desc:`+10% DMG → ${Math.round((1+(p.weaponLvl+1)*.1)*100)}%`, icon:'weapon', lvl:p.weaponLvl},
      {key:p.ctrl.b2,cost:COST_FIRE,  col:P.fire,     owned:p.fireRate,   label:'CADÊNCIA', sub:'Tiro rápido',       desc:'Disparo 2× mais rápido',    icon:'fire'},
      {key:p.ctrl.b3,cost:COST_DJUMP, col:P.djump,    owned:p.doubleJump, label:'SALTO×2', sub:'Duplo salto',       desc:'2 saltos no ar',            icon:'jump'},
      {key:p.ctrl.b4,cost:COST_PARA,  col:P.para,     owned:p.parachute,  label:'PARA',  sub:'Paraquedas',         desc:'Segura salto → cai devagar',icon:'para'},
    ];
    for(let ui=0;ui<4;ui++){
      const u=upgrades[ui];
      const col=ui%2, row=Math.floor(ui/2);
      const cx=px+cgx+col*(cw+cgx), cy=py+52+row*(ch+cgy);
      const canBuy=!u.owned&&p.coins>=u.cost;
      dUpgradeCard(cx,cy,cw,ch,u,canBuy,pi);
    }
  }

  // Continue button
  const cont=storeTimer>60;
  const cbx=W/2-150, cby=H-54, cbw=300, cbh=38;
  ctx.globalAlpha=cont?1:.35;
  const cface=dSciFrame(cbx,cby,cbw,cbh,{selected:cont,ledCol:cont?'#6060ff':'#1a1a40'});
  ctx.fillStyle=cont?'#ffffff':'#445';
  ctx.font=`bold 11px "Share Tech Mono",monospace`; ctx.textAlign='center';
  ctx.fillText(cont?'[ ENTER ]  PRÓXIMO NÍVEL':'aguarda...', W/2, cby+cbh/2+4);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

function dUpgradeCard(x,y,w,h,u,canBuy,pi){
  const isOwned=u.owned;
  // Draw sci-fi frame — owned=green, canBuy=selected/red, locked=dark
  const face=dSciFrame(x,y,w,h,{
    selected:canBuy,
    owned:isOwned,
    col:u.col,
    ledCol:isOwned?'#20ff60':canBuy?u.col:'#330a0a'
  });
  const {fx:fx2,fy,fw,fh}=face;

  // Pixel art icon — left of face
  dUpgradeIcon(fx2+4, fy+fh/2-14, u.icon, isOwned?'#30ff60':canBuy?u.col:'#443344', u.lvl||0);

  // Text — right of icon
  const tx=fx2+42;
  ctx.textAlign='left';
  ctx.fillStyle=isOwned?'#50ff70':canBuy?u.col:'#664455';
  ctx.font=`bold 9px "Share Tech Mono",monospace`;
  ctx.fillText(u.label, tx, fy+13);
  ctx.fillStyle=isOwned?'#aaeebb':canBuy?'#ccccee':'#554455';
  ctx.font='7px "Share Tech Mono",monospace';
  ctx.fillText(u.sub, tx, fy+24);
  ctx.fillStyle='#665566';
  ctx.fillText(u.desc, tx, fy+34);

  // Buy / owned button — bottom strip of face
  const bbx=fx2+2, bby=fy+fh-18, bbw=fw-4, bbh=16;
  if(isOwned){
    // Green owned strip
    ctx.fillStyle='rgba(10,40,15,.9)'; ctx.fillRect(bbx,bby,bbw,bbh);
    ctx.strokeStyle='#30a040'; ctx.lineWidth=1; ctx.strokeRect(bbx+.5,bby+.5,bbw-1,bbh-1);
    ctx.fillStyle='#40ff60'; ctx.font='bold 8px "Share Tech Mono",monospace'; ctx.textAlign='center';
    ctx.fillText('✓  COMPRADO', fx2+fw/2, bby+11);
  } else {
    const pulse=canBuy?(.75+Math.sin(gFrame*.18)*.25):1;
    ctx.globalAlpha=canBuy?pulse:.7;
    ctx.fillStyle=canBuy?'rgba(80,20,10,.95)':'rgba(15,10,25,.9)';
    ctx.fillRect(bbx,bby,bbw,bbh);
    ctx.strokeStyle=canBuy?u.col:'#2a1a2a'; ctx.lineWidth=1; ctx.strokeRect(bbx+.5,bby+.5,bbw-1,bbh-1);
    ctx.fillStyle=canBuy?u.col:'#443344';
    ctx.font='bold 7px "Share Tech Mono",monospace'; ctx.textAlign='center';
    const keyLabel=u.key.replace('Key','').replace('Digit','');
    ctx.fillText(canBuy?`[ ${keyLabel} ]  COMPRAR  ${u.cost}⬤`:`${u.cost}⬤  —  sem moedas`, fx2+fw/2, bby+10);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}

// Pixel art icons for each upgrade type
function dUpgradeIcon(x,y,type,col,lvl2){
  ctx.save();
  if(type==='weapon'){
    const len=12+Math.min(lvl2,6)*3;
    ctx.fillStyle=col; ctx.fillRect(x,y+8,len,6);
    ctx.fillStyle='#606070'; ctx.fillRect(x+2,y+14,10,10);
    if(lvl2>0){ctx.fillStyle=P.yellow; ctx.fillRect(x+len-2,y+6,3,3);}
    if(lvl2>3){ctx.fillStyle=P.dmgx; ctx.fillRect(x+len/2|0,y+4,4,4);}
  } else if(type==='fire'){
    ctx.fillStyle=P.fire; ctx.fillRect(x,y+6,22,8);
    ctx.fillStyle=P.yellow; ctx.fillRect(x+18,y+8,6,4);
    ctx.fillStyle=P.fire;
    ctx.fillRect(x,y+2,10,5); ctx.fillRect(x+2,y+14,8,5);
    ctx.fillStyle='#ff8000'; ctx.fillRect(x+6,y+4,6,4);
  } else if(type==='jump'){
    ctx.fillStyle=col;
    ctx.fillRect(x+6,y,10,10); // body
    ctx.fillRect(x+3,y+10,16,6); // legs wide
    ctx.fillStyle='#ffffff'; ctx.globalAlpha=.6;
    ctx.fillRect(x+2,y+16,5,3); // left puff
    ctx.fillRect(x+15,y+16,5,3); // right puff
    ctx.globalAlpha=1;
    ctx.fillStyle=col; ctx.fillRect(x+8,y+16,6,2);
    // Arrow up
    ctx.fillStyle=P.white; ctx.fillRect(x+9,y-4,4,5); ctx.fillRect(x+7,y-2,8,2);
  } else if(type==='para'){
    ctx.fillStyle=col;
    // Canopy
    ctx.fillRect(x+2,y,18,8);
    ctx.fillStyle=P.paraD; ctx.fillRect(x,y+3,4,5); ctx.fillRect(x+18,y+3,4,5);
    ctx.fillStyle=col; ctx.fillRect(x+6,y+8,10,4);
    // Lines
    ctx.strokeStyle=P.paraD; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x+4,y+8); ctx.lineTo(x+10,y+20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+18,y+8); ctx.lineTo(x+12,y+20); ctx.stroke();
    // Person
    ctx.fillStyle=col; ctx.fillRect(x+8,y+16,6,8);
  }
  ctx.restore();
}

function dCaption(top,bot){
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,H-44,W,44);
  ctx.fillStyle='#c0c0d0'; ctx.font='8px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText(top,W/2,H-28); ctx.fillStyle='#ff9040'; ctx.fillText(bot,W/2,H-12); ctx.textAlign='left';
}

function dDead(){
  ctx.fillStyle='rgba(0,0,0,.9)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.shadowBlur=0;
  ctx.fillStyle='#cc2020'; ctx.font='bold 30px Orbitron,monospace';
  ctx.fillText('EQUIPA ELIMINADA',W/2,50);
  ctx.fillStyle='#886666'; ctx.font='9px "Share Tech Mono",monospace';
  ctx.fillText('TODOS OS UPGRADES PERDIDOS',W/2,70);

  for(let i=0;i<numPlayers;i++){
    const p=players[i]; ctx.fillStyle=p.col.m; ctx.font='9px "Share Tech Mono",monospace';
    ctx.fillText(`P${i+1}: ${p.coins}⬤  Nível ${levelNum}  Arma ${p.weaponLvl}${p.fireRate?' · Cadência':''}${p.doubleJump?' · Salto×2':''}${p.parachute?' · Para':''}`,W/2,88+i*16);
  }

  // Highscore section
  const hy=120+numPlayers*16;
  ctx.fillStyle='rgba(10,8,28,0.95)'; ctx.fillRect(W/2-200,hy,400,138);
  ctx.strokeStyle='#334466'; ctx.lineWidth=1; ctx.strokeRect(W/2-200,hy,400,138);
  ctx.fillStyle='#6080c0'; ctx.font='bold 9px "Share Tech Mono",monospace';
  ctx.fillText('HIGHSCORE ONLINE',W/2,hy+16);

  if(scoreSubmitted){
    ctx.fillStyle='#40ff80'; ctx.font='bold 10px "Share Tech Mono",monospace';
    ctx.fillText('✓ SCORE SUBMETIDO!',W/2,hy+40);
    dLeaderboard(W/2-190,hy+52,380,80);
  } else if(scoreFormActive){
    ctx.fillStyle='#aabbcc'; ctx.font='9px "Share Tech Mono",monospace';
    ctx.fillText('NOME / EQUIPA (Enter para confirmar):',W/2,hy+34);
    // Input box
    ctx.fillStyle='rgba(20,15,50,0.95)'; ctx.fillRect(W/2-140,hy+44,280,24);
    ctx.strokeStyle=gFrame%60<30?'#60a0ff':'#304070'; ctx.lineWidth=1.5;
    ctx.strokeRect(W/2-140,hy+44,280,24);
    ctx.fillStyle='#d0e0ff'; ctx.font='bold 11px "Share Tech Mono",monospace';
    ctx.fillText(playerNameInput+(gFrame%40<20?'▎':''),W/2,hy+61);
    ctx.fillStyle='#556677'; ctx.font='7px "Share Tech Mono",monospace';
    ctx.fillText(`Nível ${levelNum}  •  ${players.reduce((s,p)=>s+p.coins,0)}⬤  •  ${numPlayers===1?'SOLO':'DUO'}`,W/2,hy+82);
    dLeaderboard(W/2-190,hy+94,380,38);
  } else if(scoreSubmitting){
    ctx.fillStyle='#8090b0'; ctx.font='9px "Share Tech Mono",monospace';
    ctx.fillText('A submeter...',W/2,hy+60);
  } else {
    ctx.fillStyle='#8090b0'; ctx.font='8px "Share Tech Mono",monospace';
    ctx.fillText(`Nível ${levelNum}  •  ${players.reduce((s,p)=>s+p.coins,0)} moedas  •  ${numPlayers===1?'SOLO':'DUO'}`,W/2,hy+40);
    ctx.fillStyle='#aaccff'; ctx.font='bold 9px "Share Tech Mono",monospace';
    const blink=gFrame%50<25;
    if(blink) ctx.fillText('[S]  SUBMETER SCORE ONLINE',W/2,hy+60);
    dLeaderboard(W/2-190,hy+74,380,58);
  }

  // Action buttons
  const blink=Math.floor(gFrame/30)%2===0;
  if(blink&&!scoreFormActive){
    ctx.fillStyle='#dddddd'; ctx.font='bold 11px "Share Tech Mono",monospace';
    ctx.fillText('[R]  RECOMEÇAR  |  [Esc]  MENU',W/2,H-22);
  }
  ctx.textAlign='left';
}

function dConsole(){
  if(!consoleOpen&&!godMode) return;
  const cx=0, cy=H-90, cw=W, ch=90;
  // Terminal panel
  if(consoleOpen){
    ctx.fillStyle='rgba(0,12,0,0.95)'; ctx.fillRect(cx,cy,cw,ch);
    ctx.strokeStyle='#00ff44'; ctx.lineWidth=1; ctx.strokeRect(cx,cy,cw,ch);
    ctx.fillStyle='#004400'; ctx.fillRect(cx,cy,cw,12);
    ctx.fillStyle='#00ff44'; ctx.font='bold 7px "Share Tech Mono",monospace'; ctx.textAlign='left';
    ctx.fillText('CRASHLANDERS DEBUG CONSOLE  [TAB/ESC para fechar]',cx+6,cy+9);
    // Log lines
    consoleLog.forEach((l,i)=>{
      ctx.fillStyle=l.includes('ON')?'#40ff40':l.includes('OFF')?'#ff4040':'#00cc44';
      ctx.font='8px "Share Tech Mono",monospace';
      ctx.fillText(l, cx+6, cy+24+i*10);
    });
    // Input line
    ctx.fillStyle='#00ff44'; ctx.font='9px "Share Tech Mono",monospace';
    const blink=gFrame%40<20?'█':'';
    ctx.fillText(`> ${consoleInput}${blink}`, cx+6, cy+ch-8);
  }
  // God mode indicator (always visible when active)
  if(godMode){
    ctx.globalAlpha=.7+Math.sin(gFrame*.12)*.3;
    ctx.fillStyle='rgba(0,200,20,0.15)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00ff44'; ctx.font='bold 8px "Share Tech Mono",monospace'; ctx.textAlign='right';
    ctx.fillText('☠ GOD MODE', W-8, 18);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
fetchLeaderboard();
// Wait for web fonts before first draw — eliminates FOUT
document.fonts.ready.then(()=>{ init(); loop(); });
</script>
